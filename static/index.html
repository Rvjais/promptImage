<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Batch Image Generator</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #0a0a0a;
            color: #e0e0e0;
            min-height: 100vh;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 2rem;
        }

        header {
            text-align: center;
            margin-bottom: 2rem;
        }

        header h1 {
            font-size: 2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
        }

        header p {
            color: #888;
            font-size: 0.95rem;
        }

        .controls {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .provider-toggle {
            display: flex;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a2a;
        }

        .provider-toggle button {
            padding: 0.6rem 1.5rem;
            border: none;
            background: transparent;
            color: #888;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
        }

        .provider-toggle button.active {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
        }

        .generate-btn {
            padding: 0.6rem 2rem;
            border: none;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        .generate-btn:hover { opacity: 0.9; }
        .generate-btn:active { transform: scale(0.98); }
        .generate-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .prompt-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .prompt-card {
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            overflow: hidden;
            transition: border-color 0.2s;
        }

        .prompt-card:focus-within {
            border-color: #667eea;
        }

        .prompt-header {
            display: flex;
            align-items: center;
            padding: 0.6rem 1rem;
            background: #1a1a1a;
            border-bottom: 1px solid #2a2a2a;
        }

        .prompt-number {
            font-size: 0.75rem;
            font-weight: 700;
            color: #667eea;
            margin-right: 0.5rem;
        }

        .prompt-card textarea {
            width: 100%;
            padding: 0.8rem 1rem;
            border: none;
            background: transparent;
            color: #e0e0e0;
            font-size: 0.9rem;
            resize: none;
            height: 80px;
            font-family: inherit;
            outline: none;
        }

        .prompt-card textarea::placeholder {
            color: #555;
        }

        .image-container {
            position: relative;
            width: 100%;
            aspect-ratio: 1;
            background: #0e0e0e;
            display: none;
            align-items: center;
            justify-content: center;
            border-top: 1px solid #2a2a2a;
        }

        .image-container.visible {
            display: flex;
        }

        .image-container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .image-container .error {
            padding: 1rem;
            color: #ff6b6b;
            font-size: 0.85rem;
            text-align: center;
        }

        .spinner {
            width: 36px;
            height: 36px;
            border: 3px solid #2a2a2a;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        .download-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            background: rgba(0,0,0,0.7);
            border: none;
            color: white;
            padding: 6px 10px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.8rem;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .image-container:hover .download-btn { opacity: 1; }

        .status-bar {
            text-align: center;
            padding: 0.5rem;
            color: #888;
            font-size: 0.85rem;
        }

        .fill-all-row {
            display: flex;
            gap: 0.5rem;
            align-items: center;
            margin-bottom: 1rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .fill-all-row input {
            flex: 1;
            padding: 0.6rem 1rem;
            border: 1px solid #2a2a2a;
            background: #141414;
            color: #e0e0e0;
            border-radius: 8px;
            font-size: 0.9rem;
            outline: none;
            font-family: inherit;
        }

        .fill-all-row input:focus { border-color: #667eea; }

        .fill-all-row button {
            padding: 0.6rem 1rem;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
            white-space: nowrap;
        }

        .fill-all-row button:hover { border-color: #667eea; color: #667eea; }

        .settings-toggle {
            padding: 0.6rem 1rem;
            border: 1px solid #2a2a2a;
            background: #1a1a1a;
            color: #ccc;
            border-radius: 8px;
            cursor: pointer;
            font-size: 0.85rem;
        }

        .settings-toggle:hover { border-color: #667eea; color: #667eea; }

        .settings-panel {
            display: none;
            max-width: 500px;
            margin: 0 auto 1.5rem;
            background: #141414;
            border: 1px solid #2a2a2a;
            border-radius: 12px;
            padding: 1.2rem;
        }

        .settings-panel.visible { display: block; }

        .settings-panel h3 {
            font-size: 0.9rem;
            color: #aaa;
            margin-bottom: 0.8rem;
        }

        .key-field {
            margin-bottom: 0.8rem;
        }

        .key-field label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.3rem;
        }

        .key-field input {
            width: 100%;
            padding: 0.5rem 0.8rem;
            border: 1px solid #2a2a2a;
            background: #0e0e0e;
            color: #e0e0e0;
            border-radius: 6px;
            font-size: 0.85rem;
            font-family: monospace;
            outline: none;
        }

        .key-field input:focus { border-color: #667eea; }

        .key-status {
            font-size: 0.75rem;
            margin-top: 0.5rem;
            color: #888;
        }

        .key-status .set { color: #4ade80; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Batch Image Generator</h1>
            <p>Generate up to 10 images in parallel</p>
        </header>

        <div class="controls">
            <div class="provider-toggle">
                <button class="active" data-provider="openai">OpenAI (DALL-E 3)</button>
                <button data-provider="gemini">Gemini (Imagen)</button>
            </div>
            <button class="generate-btn" onclick="generateAll()">Generate All</button>
            <button class="settings-toggle" onclick="toggleSettings()">API Keys</button>
        </div>

        <div class="settings-panel" id="settingsPanel">
            <h3>API Keys (stored in your browser only)</h3>
            <div class="key-field">
                <label>OpenAI API Key</label>
                <input type="password" id="openaiKey" placeholder="sk-..." oninput="saveKeys()">
            </div>
            <div class="key-field">
                <label>Gemini API Key</label>
                <input type="password" id="geminiKey" placeholder="AI..." oninput="saveKeys()">
            </div>
            <div class="key-status" id="keyStatus"></div>
        </div>

        <div class="fill-all-row">
            <input type="text" id="fillAllInput" placeholder="Type a base prompt to fill all empty fields...">
            <button onclick="fillAll()">Fill Empty</button>
            <button onclick="clearAll()">Clear All</button>
        </div>

        <div class="prompt-grid" id="promptGrid"></div>
        <div class="status-bar" id="statusBar"></div>
    </div>

    <script>
        const NUM_PROMPTS = 10;
        let currentProvider = 'openai';

        // Load saved keys
        function loadKeys() {
            const openaiKey = localStorage.getItem('openai_key') || '';
            const geminiKey = localStorage.getItem('gemini_key') || '';
            document.getElementById('openaiKey').value = openaiKey;
            document.getElementById('geminiKey').value = geminiKey;
            updateKeyStatus();
        }

        function saveKeys() {
            localStorage.setItem('openai_key', document.getElementById('openaiKey').value.trim());
            localStorage.setItem('gemini_key', document.getElementById('geminiKey').value.trim());
            updateKeyStatus();
        }

        function updateKeyStatus() {
            const o = localStorage.getItem('openai_key');
            const g = localStorage.getItem('gemini_key');
            const parts = [];
            if (o) parts.push('OpenAI: <span class="set">set</span>');
            else parts.push('OpenAI: not set');
            if (g) parts.push('Gemini: <span class="set">set</span>');
            else parts.push('Gemini: not set');
            document.getElementById('keyStatus').innerHTML = parts.join(' &nbsp;|&nbsp; ');
        }

        function toggleSettings() {
            document.getElementById('settingsPanel').classList.toggle('visible');
        }

        loadKeys();

        // Provider toggle
        document.querySelectorAll('.provider-toggle button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.provider-toggle button').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                currentProvider = btn.dataset.provider;
            });
        });

        // Build prompt cards
        const grid = document.getElementById('promptGrid');
        for (let i = 0; i < NUM_PROMPTS; i++) {
            const card = document.createElement('div');
            card.className = 'prompt-card';
            card.innerHTML = `
                <div class="prompt-header">
                    <span class="prompt-number">#${i + 1}</span>
                </div>
                <textarea id="prompt-${i}" placeholder="Enter prompt ${i + 1}..."></textarea>
                <div class="image-container" id="img-container-${i}">
                    <div class="spinner" id="spinner-${i}"></div>
                    <img id="img-${i}" style="display:none" />
                    <div class="error" id="error-${i}" style="display:none"></div>
                    <button class="download-btn" id="dl-${i}" style="display:none" onclick="downloadImage(${i})">Download</button>
                </div>
            `;
            grid.appendChild(card);
        }

        function fillAll() {
            const base = document.getElementById('fillAllInput').value.trim();
            if (!base) return;
            for (let i = 0; i < NUM_PROMPTS; i++) {
                const ta = document.getElementById(`prompt-${i}`);
                if (!ta.value.trim()) {
                    ta.value = base;
                }
            }
        }

        function clearAll() {
            for (let i = 0; i < NUM_PROMPTS; i++) {
                document.getElementById(`prompt-${i}`).value = '';
                document.getElementById(`img-container-${i}`).classList.remove('visible');
            }
        }

        async function generateAll() {
            const prompts = [];
            for (let i = 0; i < NUM_PROMPTS; i++) {
                prompts.push(document.getElementById(`prompt-${i}`).value.trim());
            }

            const filledPrompts = prompts.filter(p => p);
            if (filledPrompts.length === 0) {
                document.getElementById('statusBar').textContent = 'Please enter at least one prompt.';
                return;
            }

            const btn = document.querySelector('.generate-btn');
            btn.disabled = true;
            btn.textContent = 'Generating...';

            // Show spinners for filled prompts
            for (let i = 0; i < NUM_PROMPTS; i++) {
                const container = document.getElementById(`img-container-${i}`);
                const spinner = document.getElementById(`spinner-${i}`);
                const img = document.getElementById(`img-${i}`);
                const error = document.getElementById(`error-${i}`);
                const dl = document.getElementById(`dl-${i}`);

                if (prompts[i]) {
                    container.classList.add('visible');
                    spinner.style.display = 'block';
                    img.style.display = 'none';
                    error.style.display = 'none';
                    dl.style.display = 'none';
                } else {
                    container.classList.remove('visible');
                }
            }

            document.getElementById('statusBar').textContent = `Generating ${filledPrompts.length} image(s) in parallel...`;

            try {
                const apiKey = currentProvider === 'openai'
                    ? localStorage.getItem('openai_key')
                    : localStorage.getItem('gemini_key');

                if (!apiKey) {
                    throw new Error(`Please set your ${currentProvider === 'openai' ? 'OpenAI' : 'Gemini'} API key first (click "API Keys")`);
                }

                const response = await fetch('/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompts: prompts.filter(p => p), provider: currentProvider, api_key: apiKey })
                });

                if (!response.ok) {
                    const err = await response.json();
                    throw new Error(err.detail || 'Generation failed');
                }

                const data = await response.json();

                // Map results back to their prompt indices
                let resultIdx = 0;
                for (let i = 0; i < NUM_PROMPTS; i++) {
                    if (!prompts[i]) continue;

                    const result = data.results[resultIdx++];
                    const spinner = document.getElementById(`spinner-${i}`);
                    const img = document.getElementById(`img-${i}`);
                    const error = document.getElementById(`error-${i}`);
                    const dl = document.getElementById(`dl-${i}`);

                    spinner.style.display = 'none';

                    if (result.image_base64) {
                        img.src = `data:image/png;base64,${result.image_base64}`;
                        img.style.display = 'block';
                        dl.style.display = 'block';
                    } else {
                        error.textContent = result.error || 'Unknown error';
                        error.style.display = 'block';
                    }
                }

                const successCount = data.results.filter(r => r.image_base64).length;
                document.getElementById('statusBar').textContent = `Done! ${successCount}/${filledPrompts.length} images generated successfully.`;
            } catch (err) {
                document.getElementById('statusBar').textContent = `Error: ${err.message}`;
                for (let i = 0; i < NUM_PROMPTS; i++) {
                    document.getElementById(`spinner-${i}`).style.display = 'none';
                }
            }

            btn.disabled = false;
            btn.textContent = 'Generate All';
        }

        function downloadImage(index) {
            const img = document.getElementById(`img-${index}`);
            const link = document.createElement('a');
            link.href = img.src;
            link.download = `image-${index + 1}.png`;
            link.click();
        }

        // Ctrl+Enter to generate
        document.addEventListener('keydown', (e) => {
            if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
                generateAll();
            }
        });
    </script>
</body>
</html>
